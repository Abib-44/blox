<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Generator - JSON Only</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style id="cv-styles">
:root {
  --sidebar-bg: #1f2e26;
  --sidebar-text: #e8e4d8;
  --sidebar-muted: #9fae9f;
  --paper-bg: #f7f3ea;
  --ink: #2b2b28;
  --ink-soft: #55534c;
  --gold: #a8763c;
  --rule: #d8d0bd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.page {
  font-family: 'Lato', sans-serif;
  display: grid;
  grid-template-columns: 300px 1fr;
  width: 210mm;
  height: 297mm;
  background: var(--paper-bg);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  overflow-y: auto;
}
.sidebar { background: var(--sidebar-bg); color: var(--sidebar-text); padding: 40px 32px; }
.avatar { width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 32px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.side-block { margin-bottom: 30px; }
.side-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
.side-item { font-size: 13.5px; line-height: 1.5; margin-bottom: 10px; }
.side-item strong { color: #fff; }
.side-links { display: flex; flex-direction: column; gap: 8px; }
.side-links a { color: var(--sidebar-text); text-decoration: none; }
.formation-entry { border-left: 2px solid var(--gold); padding-left: 12px; margin-bottom: 18px; }
.formation-year { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); font-weight: 700; }
.formation-title { font-size: 13.5px; font-weight: 700; color: #fff; }
.formation-school { font-size: 12.5px; color: var(--sidebar-muted); margin-top: 2px; }
.content { padding: 44px 48px; }
h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; color: var(--ink); }
.role { color: var(--gold); font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; }
.availability { font-size: 12.5px; color: var(--ink-soft); }
.header-rule { width: 60px; height: 2px; background: var(--gold); margin: 18px 0 28px; }
.section { margin-bottom: 30px; }
.section-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.section-num { font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold); font-size: 19px; }
.section-name { font-size: 12.5px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; color: var(--ink); }
.profil-text { font-size: 13.8px; line-height: 1.65; color: var(--ink-soft); white-space: pre-line; }
.entry { position: relative; padding-left: 20px; margin-bottom: 22px; border-left: 1px solid var(--rule); }
.entry::before { content: ''; position: absolute; left: -5px; top: 4px; width: 9px; height: 9px; border-radius: 50%; background: var(--paper-bg); border: 2px solid var(--gold); }
.entry-date { font-size: 11.5px; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; }
.entry-title { font-size: 15.5px; font-weight: 700; color: var(--ink); }
.entry-org { font-size: 13px; font-style: italic; color: var(--ink-soft); }
.entry-stack { font-size: 12px; color: var(--ink-soft); }
</style>
<style>
body { font-family: 'Lato', sans-serif; background: #14181a; color: #d7dadb; display: flex; height: 100vh; margin:0; overflow:hidden; }
.editor { width: 480px; background: #1c2226; display: flex; flex-direction: column; border-right: 1px solid #2a3236; }
.editor-header { padding: 16px 18px; border-bottom: 1px solid #2a3236; display:flex; align-items:center; justify-content:space-between; }
h2 { margin:0; color:#a8763c; font-size:14px; text-transform:uppercase; letter-spacing:1px; }
.json-toolbar { padding:10px 18px; border-bottom:1px solid #2a3236; color:#9aa3a7; font-size:12.5px; }
#jsonInput { flex:1; background:#0e1113; color:#c5e3c8; border:none; padding:16px; font-family:monospace; font-size:13px; line-height:1.5; resize:none; outline:none; }
.preview-wrap { flex:1; overflow:auto; padding:30px 20px; background:#0f1214; display:flex; justify-content:center; }
button { background:#2a3236; color:#d7dadb; border:1px solid #3a444a; border-radius:4px; padding:7px 12px; cursor:pointer; }
button:hover { background:#3a444a; }
#status { padding:10px 18px; font-size:12px; border-top:1px solid #2a3236; }
#status.ok { color:#7fbf82; }
#status.error { color:#d9776a; }
#toast {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: #3a1f1f;
  color: #f2b8ae;
  border: 1px solid #6b3630;
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 13px;
  max-width: 80vw;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 1000;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="editor">
  <div class="editor-header">
    <h2>ÉDITEUR JSON</h2>
    <div>
      <button id="btnReset">Réinitialiser</button>
      <button id="btnDownloadHtml">📋 Copier HTML</button>
    </div>
  </div>
  <div class="json-toolbar">
    Modifie le JSON ci-dessous — la preview se met à jour automatiquement
  </div>
  <textarea id="jsonInput" spellcheck="false"></textarea>
  <div id="status">Prêt</div>
</div>

<div class="preview-wrap">
  <div class="page" id="preview"></div>
</div>

<div id="toast"></div>

<script>
const FIXED = {
  fullName: "El Habib Benaboud",
  contact: { location: "Lyon", phone: "06 52 68 72 35", email: "elh.benaboud@gmail.com" }
};

const DEFAULT_DATA = {
  role: "Alternant Développeur Web (H/F)",
  availability: "Disponible dès septembre 2026 — Rythme : 3 semaines entreprise / 1 semaine d'école",
  avatarUrl: "",
  links: [
    { label: "Portfolio", url: "#" },
    { label: "Projets DevOps", url: "#" },
    { label: "Projets Développement", url: "#" },
    { label: "LinkedIn", url: "#" }
  ],
  skills: [
    { name: "Backend", value: "PHP, Phalcon" },
    { name: "Frontend", value: "HTML5, CSS3, JavaScript, Bootstrap" },
    { name: "Database", value: "MySQL / MariaDB" },
    { name: "DevOps / Tools", value: "Docker, Linux, Bash Scripts, GitHub" }
  ],
  formation: [
    { year: "2026 — Présent", title: "Développeur web • Bac +3", school: "CESI École d'Ingénieurs — Lyon" }
  ],
  sections: [
    {
      title: "Profil",
      type: "text",
      content: "Développeur back-end formé sur des projets réels en production."
    },
    {
      title: "Expérience",
      type: "experience",
      items: [
        {
          date: "2025 — 2026",
          title: "Développeur PHP Junior",
          org: "Nom Entreprise — Lyon",
          stack: ["PHP", "Phalcon", "MySQL"]
        }
      ]
    }
  ]
};

let currentData = JSON.parse(JSON.stringify(DEFAULT_DATA));

function escapeHtml(v) { return String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function hasText(v) { return typeof v === "string" && v.trim().length > 0; }

function renderSection(section, index) {
  const num = String(index + 1).padStart(2, "0");
  let body = "";

  if (section.type === "text") {
    body = `<p class="profil-text">${escapeHtml(section.content)}</p>`;
  }

  if (section.type === "experience") {
    body = (section.items || []).map(item => `
      <div class="entry">
        <div class="entry-date">${escapeHtml(item.date)}</div>
        <div class="entry-title">${escapeHtml(item.title)}</div>
        <div class="entry-org">${escapeHtml(item.org)}</div>
        ${item.stack ? `<div class="entry-stack">${escapeHtml(Array.isArray(item.stack) ? item.stack.join(" · ") : item.stack)}</div>` : ""}
      </div>`).join("");
  }

  if (!body) return "";

  return `<section class="section">
      <div class="section-title"><span class="section-num">${num}</span><span class="section-name">${escapeHtml(section.title)}</span></div>
      ${body}
    </section>`;
}

function renderCV(data) {
  const avatarHtml = hasText(data.avatarUrl)
    ? `<div class="avatar"><img src="${escapeHtml(data.avatarUrl)}" alt=""></div>`
    : "";

  const skillsHtml = (data.skills || [])
    .map(s => `<div class="side-item"><strong>${escapeHtml(s.name)} :</strong> ${escapeHtml(s.value)}</div>`)
    .join("");

  const linksHtml = (data.links || [])
    .map(l => `<a href="${escapeHtml(l.url)}">${escapeHtml(l.label)}</a>`)
    .join("");

  const formationHtml = (data.formation || [])
    .map(f => `
      <div class="formation-entry">
        <div class="formation-year">${escapeHtml(f.year)}</div>
        <div class="formation-title">${escapeHtml(f.title)}</div>
        <div class="formation-school">${escapeHtml(f.school)}</div>
      </div>`)
    .join("");

  const sectionsHtml = (data.sections || [])
    .map((s, i) => renderSection(s, i))
    .join("");

  return `
    <aside class="sidebar">
      ${avatarHtml}
      <div class="side-block">
        <div class="side-label">Contact</div>
        <div class="side-item"><strong>Localisation</strong><br>${escapeHtml(FIXED.contact.location)}</div>
        <div class="side-item"><strong>Téléphone</strong><br>${escapeHtml(FIXED.contact.phone)}</div>
        <div class="side-item"><strong>Email</strong><br>${escapeHtml(FIXED.contact.email)}</div>
      </div>
      ${skillsHtml ? `<div class="side-block"><div class="side-label">Compétences</div>${skillsHtml}</div>` : ""}
      ${linksHtml ? `<div class="side-block"><div class="side-label">Liens</div><div class="side-links">${linksHtml}</div></div>` : ""}
      ${formationHtml ? `<div class="side-block"><div class="side-label">Formation</div>${formationHtml}</div>` : ""}
    </aside>
    <main class="content">
      <h1>${escapeHtml(FIXED.fullName)}</h1>
      ${hasText(data.role) ? `<div class="role">${escapeHtml(data.role)}</div>` : ""}
      ${hasText(data.availability) ? `<div class="availability">${escapeHtml(data.availability)}</div>` : ""}
      <div class="header-rule"></div>
      ${sectionsHtml}
    </main>`;
}

function buildStandaloneHtml(data) {
  const styles = document.getElementById("cv-styles").outerHTML;
  return `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV - ${escapeHtml(FIXED.fullName)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
${styles}
</head>
<body>
<div class="page">${renderCV(data)}</div>
</body>
</html>`;
}

const jsonInput = document.getElementById("jsonInput");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

function setStatus(text, isError) {
  statusEl.textContent = text;
  statusEl.className = isError ? "error" : "ok";
}

const toastEl = document.getElementById("toast");
let toastTimer;

function showToast(message, duration) {
  clearTimeout(toastTimer);
  toastEl.textContent = message;
  toastEl.classList.add("show");
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), duration);
}

let debounceTimer;
jsonInput.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    try {
      currentData = JSON.parse(jsonInput.value);
      preview.innerHTML = renderCV(currentData);
      setStatus("✅ Mise à jour", false);
    } catch (e) {
      setStatus("❌ Erreur JSON : " + e.message, true);
      showToast("❌ JSON invalide : " + e.message, 3500);
    }
  }, 300);
});

document.getElementById("btnReset").onclick = () => {
  currentData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  jsonInput.value = JSON.stringify(DEFAULT_DATA, null, 2);
  preview.innerHTML = renderCV(currentData);
  setStatus("Prêt", false);
};

document.getElementById("btnDownloadHtml").onclick = async () => {
  const html = buildStandaloneHtml(currentData);
  try {
    await navigator.clipboard.writeText(html);
    setStatus("✅ HTML copié dans le presse-papiers", false);
  } catch (e) {
    const ta = document.createElement("textarea");
    ta.value = html;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    setStatus("✅ HTML copié (méthode alternative)", false);
  }
};

jsonInput.value = JSON.stringify(DEFAULT_DATA, null, 2);
preview.innerHTML = renderCV(currentData);
</script>
</body>
</html>
