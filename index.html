<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style id="cv-styles">
:root {
  --sidebar-bg: #1f2e26;
  --sidebar-text: #e8e4d8;
  --sidebar-muted: #9fae9f;
  --paper-bg: #f7f3ea;
  --ink: #2b2b28;
  --ink-soft: #55534c;
  --gold: #a8763c;
  --rule: #d8d0bd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.page {
  font-family: 'Lato', sans-serif;
  display: grid;
  grid-template-columns: 300px 1fr;
  width: 210mm;
  height: 297mm;
  background: var(--paper-bg);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.page::-webkit-scrollbar { display: none; width: 0; height: 0; }
.sidebar { background: var(--sidebar-bg); color: var(--sidebar-text); padding: 40px 32px; }
.avatar { width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 32px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.side-block { margin-bottom: 30px; }
.side-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
.side-item { font-size: 13.5px; line-height: 1.5; margin-bottom: 10px; }
.side-item strong { color: #fff; }
.side-links { display: flex; flex-direction: column; gap: 8px; }
.side-links a {
  color: var(--sidebar-text); font-size: 13px; text-decoration: none;
  border-bottom: 1px solid rgba(232,228,216,0.35); padding-bottom: 3px; width: fit-content;
}
.side-links a:hover { color: var(--gold); border-color: var(--gold); }
.formation-entry { border-left: 2px solid var(--gold); padding-left: 12px; margin-bottom: 18px; }
.formation-entry:last-child { margin-bottom: 0; }
.formation-year { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
.formation-title { font-size: 13.5px; font-weight: 700; color: #fff; line-height: 1.35; }
.formation-school { font-size: 12px; font-style: italic; color: var(--sidebar-muted); margin-top: 2px; }
.content { padding: 44px 48px; }
h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; color: var(--ink); }
.role { color: var(--gold); font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; margin-top: 6px; }
.availability { font-size: 12.5px; color: var(--ink-soft); margin-top: 6px; }
.header-rule { width: 60px; height: 2px; background: var(--gold); margin: 18px 0 28px; }
.section { margin-bottom: 30px; }
.section-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.section-num { font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold); font-size: 19px; }
.section-name { font-size: 12.5px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; color: var(--ink); }
.profil-text { font-size: 13.8px; line-height: 1.65; color: var(--ink-soft); white-space: pre-line; }
.entry { position: relative; padding-left: 20px; margin-bottom: 22px; border-left: 1px solid var(--rule); }
.entry:last-child { margin-bottom: 0; }
.entry::before { content: ''; position: absolute; left: -5px; top: 4px; width: 9px; height: 9px; border-radius: 50%; background: var(--paper-bg); border: 2px solid var(--gold); }
.entry-date { font-size: 11.5px; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; }
.entry-title { font-size: 15.5px; font-weight: 700; margin-top: 3px; color: var(--ink); }
.entry-org { font-size: 13px; font-style: italic; color: var(--ink-soft); margin-top: 1px; }
.entry ul { margin: 10px 0 8px 18px; }
.entry li { font-size: 13.2px; line-height: 1.55; margin-bottom: 5px; color: var(--ink); }
.entry-stack { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
.entry-stack b { color: var(--ink); font-weight: 700; }
@media print {
  .page { box-shadow: none; height: auto; overflow: visible; }
  @page { size: A4; margin: 0; }
}
</style>
<style id="app-chrome">
body { font-family: 'Lato', sans-serif; background: #14181a; color: #d7dadb; display: flex; height: 100vh; overflow: hidden; }
.editor { width: 440px; min-width: 440px; background: #1c2226; display: flex; flex-direction: column; border-right: 1px solid #2a3236; }
.editor-header { padding: 16px 18px; border-bottom: 1px solid #2a3236; display:flex; align-items:center; justify-content:space-between; }
.editor-header h2 { font-size: 14px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
.editor-toolbar { display: flex; gap: 8px; padding: 12px 18px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #2a3236; }
button, .file-btn {
  background: #2a3236; color: #d7dadb; border: 1px solid #3a444a; border-radius: 4px;
  padding: 7px 12px; font-size: 12.5px; cursor: pointer; white-space: nowrap;
}
button:hover, .file-btn:hover { background: #3a444a; }
#fileInput, #avatarFile { display: none; }
#formRoot { flex: 1; overflow-y: auto; padding: 4px 18px 24px; }
.form-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid #2a3236; }
.form-section:first-child { margin-top: 8px; border-top: none; }
.form-section-title { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 12px; }
.field-label { display:block; font-size: 11.5px; color: #9aa3a7; margin: 10px 0 4px; }
.field-input, .field-textarea, .field-select {
  width: 100%; background: #0e1113; color: #e8e4d8; border: 1px solid #2a3236; border-radius: 4px;
  padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none;
}
.field-input:focus, .field-textarea:focus, .field-select:focus { border-color: var(--gold); }
.field-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.array-item { background: #171c1f; border: 1px solid #2a3236; border-radius: 6px; padding: 12px; margin-bottom: 10px; position: relative; }
.array-item-row { display: flex; gap: 8px; }
.array-item-row > div { flex: 1; }
.item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.item-tag { font-size: 11px; color: var(--sidebar-muted); text-transform: uppercase; letter-spacing: 1px; }
.btn-remove { background: #3a2426; border-color: #5a3236; color: #e08b83; font-size: 11px; padding: 4px 8px; }
.btn-remove:hover { background: #4a2c2f; }
.btn-add { width: 100%; margin-top: 4px; border-style: dashed; color: var(--gold); }
.avatar-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
.avatar-preview { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; border: 2px solid var(--gold); flex-shrink: 0; background:#0e1113; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; display:block; }
.sub-block { margin-top: 10px; padding: 10px; background: #0e1113; border-radius: 4px; }
#status { padding: 10px 18px; font-size: 12px; border-top: 1px solid #2a3236; }
#status.ok { color: #7fbf82; }
#status.error { color: #d9776a; }
.json-panel { display: none; flex-direction: column; flex: 1; overflow:hidden; }
.json-panel.open { display: flex; }
#jsonInput { flex: 1; background: #0e1113; color: #c5e3c8; border: none; padding: 16px 18px; font-family: monospace; font-size: 12.8px; line-height: 1.5; resize: none; outline: none; }
.preview-wrap { flex: 1; overflow: auto; padding: 30px 20px; display: flex; justify-content: center; background: #0f1214; }
@media print { .editor { display: none; } .preview-wrap { padding: 0; background: none; overflow: visible; } }
</style>
</head>
<body>
<div class="editor">
  <div class="editor-header">
    <h2>Éditeur CV</h2>
    <button id="btnToggleJson">{ } JSON avancé</button>
  </div>
  <div class="editor-toolbar">
    <button id="btnReset">Réinitialiser</button>
    <label class="file-btn" for="fileInput">📄 Charger JSON</label>
    <input type="file" id="fileInput" accept="application/json">
    <button id="btnDownloadJson">↓ Exporter JSON</button>
    <button id="btnDownloadHtml">📋 Copier HTML</button>
  </div>
  <div id="formRoot"></div>
  <div class="json-panel" id="jsonPanel">
    <textarea id="jsonInput" spellcheck="false"></textarea>
  </div>
  <div id="status"></div>
</div>
<div class="preview-wrap">
  <div class="page" id="preview"></div>
</div>
<script>
const FIXED = {
  fullName: "El Habib Benaboud",
  contact: { location: "Lyon", phone: "06 52 68 72 35", email: "elh.benaboud@gmail.com" }
};
const DEFAULT_DATA = {
  role: "Alternant Développeur Web (H/F)",
  availability: "Disponible dès septembre 2026 — Rythme : 3 semaines entreprise / 1 semaine d'école",
  avatarUrl: "",
  links: [
    { label: "Portfolio", url: "#" },
    { label: "Projets DevOps", url: "#" },
    { label: "Projets Développement", url: "#" },
    { label: "LinkedIn", url: "#" }
  ],
  skills: [
    { name: "Backend", value: "PHP, Phalcon" },
    { name: "Frontend", value: "HTML5, CSS3, JavaScript, Bootstrap" },
    { name: "Database", value: "MySQL / MariaDB" },
    { name: "DevOps / Tools", value: "Docker, Linux, Bash Scripts, GitHub" }
  ],
  formation: [
    { year: "2026 — Présent", title: "Développeur web • Bac +3", school: "CESI École d'Ingénieurs — Lyon" },
    { year: "2023 — 2024", title: "Développeur Web & Web Mobile • Bac +2", school: "CCI Formation — Lyon" }
  ],
  sections: [
    {
      title: "Profil",
      type: "text",
      content: "Développeur back-end formé sur des projets réels en production (datacenter, PHP/Laravel). Alternance visée pour approfondir Linux, Docker et CI/CD tout en contribuant dès mon arrivée."
    },
    {
      title: "Expérience",
      type: "entries",
      items: [
        {
          date: "Mars — Sept. 2025",
          title: "Développeur Back-End",
          org: "Nexeren",
          bulletsText: "Livraison systématique à +33% des points assignés par sprint (30 assignés → 40 livrés)\nRefactoring du mapping Elasticsearch (edge-ngram sur les champs titre), réduisant les résultats non pertinents de 70%\nIntégration et configuration de services tiers dans une stack Docker Compose",
          stack: "PHP · Laravel · Docker · Kubernetes · Linux · SQL · MySQL · Bash"
        },
        {
          date: "Sept. — Déc. 2024",
          title: "Développeur Back-End — Stage",
          org: "CCI",
          bulletsText: "Refactoring de la couche service Laravel, réduisant d'environ 10% le temps d'exécution des requêtes\nMise en place d'une pipeline GitLab CI/CD automatisant le build pour un déploiement immédiat",
          stack: "PHP · Laravel · Linux · SQL · MySQL · GitLab CI/CD · Docker"
        }
      ]
    },
    {
      title: "Projets",
      type: "entries",
      items: [
        {
          date: "2025 — Présent",
          title: "Home Lab Proxmox",
          org: "Serveur personnel auto-hébergé",
          bulletsText: "Serveur maison pour héberger sites web et services, accès Linux isolés par service\nSupervision système via Prometheus et Grafana",
          stack: "Docker · Proxmox · MinIO · Grafana · Prometheus · Bash · Linux"
        },
        {
          date: "2026",
          title: "Plateforme de gestion administrative universitaire",
          org: "Projet académique",
          bulletsText: "Pipeline bout-en-bout : Python/boto3 vers stockage objet MinIO, puis PostgreSQL\nCI/CD GitLab intégré pour le déploiement automatisé de l'infrastructure",
          stack: "PHP · Symfony · MySQL"
        }
      ]
    }
  ]
};
let currentData = JSON.parse(JSON.stringify(DEFAULT_DATA));

function escapeHtml(value) {
  return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escapeAttr(value) {
  return escapeHtml(value).replace(/"/g, "&quot;");
}
function setPath(obj, path, value) {
  const parts = path.split(".");
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const p = parts[i];
    cur = cur[/^\d+$/.test(p) ? Number(p) : p];
  }
  const last = parts[parts.length - 1];
  cur[/^\d+$/.test(last) ? Number(last) : last] = value;
}
function hasText(v) {
  return typeof v === "string" && v.trim().length > 0;
}

function renderEntry(entry) {
  const bullets = (entry.bulletsText || "")
    .split("\n").map(b => b.trim()).filter(Boolean)
    .map(b => `<li>${escapeHtml(b)}</li>`).join("");

  if (!hasText(entry.date) && !hasText(entry.title) && !hasText(entry.org) && !bullets && !hasText(entry.stack)) {
    return "";
  }

  return `
    <div class="entry">
      ${hasText(entry.date) ? `<div class="entry-date">${escapeHtml(entry.date)}</div>` : ''}
      ${hasText(entry.title) ? `<div class="entry-title">${escapeHtml(entry.title)}</div>` : ''}
      ${hasText(entry.org) ? `<div class="entry-org">${escapeHtml(entry.org)}</div>` : ''}
      ${bullets ? `<ul>${bullets}</ul>` : ''}
      ${hasText(entry.stack) ? `<div class="entry-stack"><b>Stack :</b> ${escapeHtml(entry.stack)}</div>` : ''}
    </div>`;
}

function renderSection(section, index) {
  const num = String(index + 1).padStart(2, '0');

  if (section.type === 'entries') {
    const itemsHtml = (section.items || []).map(renderEntry).filter(Boolean).join('');
    if (!itemsHtml || !hasText(section.title)) return "";
    return `
      <section class="section">
        <div class="section-title"><span class="section-num">${num}</span><span class="section-name">${escapeHtml(section.title)}</span></div>
        ${itemsHtml}
      </section>`;
  }

  if (!hasText(section.title) || !hasText(section.content)) return "";
  return `
    <section class="section">
      <div class="section-title"><span class="section-num">${num}</span><span class="section-name">${escapeHtml(section.title)}</span></div>
      <p class="profil-text">${escapeHtml(section.content)}</p>
    </section>`;
}

function renderCV(data) {
  const validSkills = (data.skills || []).filter(s => hasText(s.name) || hasText(s.value));
  const skillsHtml = validSkills.map(s =>
    `<div class="side-item"><strong>${escapeHtml(s.name)} :</strong> ${escapeHtml(s.value)}</div>`
  ).join('');

  const validFormation = (data.formation || []).filter(f => hasText(f.year) || hasText(f.title) || hasText(f.school));
  const formationHtml = validFormation.map(f => `
    <div class="formation-entry">
      ${hasText(f.year) ? `<div class="formation-year">${escapeHtml(f.year)}</div>` : ''}
      ${hasText(f.title) ? `<div class="formation-title">${escapeHtml(f.title)}</div>` : ''}
      ${hasText(f.school) ? `<div class="formation-school">${escapeHtml(f.school)}</div>` : ''}
    </div>`).join('');

  const validLinks = (data.links || []).filter(l => hasText(l.label) && hasText(l.url));
  const linksHtml = validLinks.map(l =>
    `<a href="${escapeAttr(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`
  ).join('');

  const sectionsHtml = (data.sections || []).map(renderSection).filter(Boolean).join('');

  return `
    <aside class="sidebar">
      ${hasText(data.avatarUrl) ? `<div class="avatar"><img src="${escapeAttr(data.avatarUrl)}" alt="${escapeAttr(FIXED.fullName)}"></div>` : ''}
      <div class="side-block">
        <div class="side-label">Contact</div>
        <div class="side-item"><strong>Localisation</strong><br>${escapeHtml(FIXED.contact.location)}</div>
        <div class="side-item"><strong>Téléphone</strong><br>${escapeHtml(FIXED.contact.phone)}</div>
        <div class="side-item"><strong>Email</strong><br>${escapeHtml(FIXED.contact.email)}</div>
      </div>
      ${skillsHtml ? `<div class="side-block"><div class="side-label">Compétences</div>${skillsHtml}</div>` : ''}
      ${linksHtml ? `<div class="side-block"><div class="side-label">Liens</div><div class="side-links">${linksHtml}</div></div>` : ''}
      ${formationHtml ? `<div class="side-block"><div class="side-label">Formation</div>${formationHtml}</div>` : ''}
    </aside>
    <main class="content">
      <h1>${escapeHtml(FIXED.fullName)}</h1>
      ${hasText(data.role) ? `<div class="role">${escapeHtml(data.role)}</div>` : ''}
      ${hasText(data.availability) ? `<div class="availability">${escapeHtml(data.availability)}</div>` : ''}
      <div class="header-rule"></div>
      ${sectionsHtml}
    </main>`;
}

function mount() {
  document.getElementById("preview").innerHTML = renderCV(currentData);
}

function field(label, path, value, opts = {}) {
  const val = escapeAttr(value ?? "");
  if (opts.textarea) {
    return `<label class="field-label">${label}</label>
      <textarea class="field-textarea" data-field="${path}" placeholder="${opts.placeholder || ''}">${escapeHtml(value ?? "")}</textarea>`;
  }
  return `<label class="field-label">${label}</label>
    <input class="field-input" type="text" data-field="${path}" value="${val}" placeholder="${opts.placeholder || ''}">`;
}
function btn(action, idx, label, extraClass = "") {
  const idxAttr = idx !== undefined ? ` data-idx="${idx}"` : "";
  return `<button type="button" class="${extraClass}" data-action="${action}"${idxAttr}>${label}</button>`;
}
function renderForm() {
  const d = currentData;
  const general = `
    <div class="form-section">
      <div class="form-section-title">Général</div>
      ${field("Poste recherché", "role", d.role)}
      ${field("Disponibilité", "availability", d.availability, { placeholder: "Ex : Disponible dès..." })}
      <div class="avatar-row">
        <div class="avatar-preview"><img src="${escapeAttr(d.avatarUrl || '')}" alt=""></div>
        <label class="file-btn" for="avatarFile">🖼️ Changer la photo</label>
      </div>
    </div>`;
  const links = `
    <div class="form-section">
      <div class="form-section-title">Liens</div>
      ${(d.links || []).map((l, i) => `
        <div class="array-item">
          <div class="item-header">
            <span class="item-tag">Lien ${i + 1}</span>
            ${btn("remove-link", i, "✕ Retirer", "btn-remove")}
          </div>
          <div class="array-item-row">
            <div>${field("Libellé", `links.${i}.label`, l.label)}</div>
            <div>${field("URL", `links.${i}.url`, l.url)}</div>
          </div>
        </div>`).join("")}
      ${btn("add-link", undefined, "+ Ajouter un lien", "btn-add")}
    </div>`;
  const skills = `
    <div class="form-section">
      <div class="form-section-title">Compétences</div>
      ${(d.skills || []).map((s, i) => `
        <div class="array-item">
          <div class="item-header">
            <span class="item-tag">Compétence ${i + 1}</span>
            ${btn("remove-skill", i, "✕ Retirer", "btn-remove")}
          </div>
          <div class="array-item-row">
            <div>${field("Catégorie", `skills.${i}.name`, s.name)}</div>
            <div>${field("Détail", `skills.${i}.value`, s.value)}</div>
          </div>
        </div>`).join("")}
      ${btn("add-skill", undefined, "+ Ajouter une compétence", "btn-add")}
    </div>`;
  const formation = `
    <div class="form-section">
      <div class="form-section-title">Formation</div>
      ${(d.formation || []).map((f, i) => `
        <div class="array-item">
          <div class="item-header">
            <span class="item-tag">Formation ${i + 1}</span>
            ${btn("remove-formation", i, "✕ Retirer", "btn-remove")}
          </div>
          ${field("Période", `formation.${i}.year`, f.year)}
          ${field("Intitulé", `formation.${i}.title`, f.title)}
          ${field("École", `formation.${i}.school`, f.school)}
        </div>`).join("")}
      ${btn("add-formation", undefined, "+ Ajouter une formation", "btn-add")}
    </div>`;
  const sections = `
    <div class="form-section">
      <div class="form-section-title">Sections du CV</div>
      ${(d.sections || []).map((s, i) => `
        <div class="array-item">
          <div class="item-header">
            <span class="item-tag">Section ${i + 1} — ${s.type === 'entries' ? 'Liste' : 'Texte'}</span>
            ${btn("remove-section", i, "✕ Retirer", "btn-remove")}
          </div>
          ${field("Titre de la section", `sections.${i}.title`, s.title)}
          <label class="field-label">Type</label>
          <select class="field-select" data-field="sections.${i}.type">
            <option value="text" ${s.type !== 'entries' ? 'selected' : ''}>Texte libre</option>
            <option value="entries" ${s.type === 'entries' ? 'selected' : ''}>Liste d'expériences</option>
          </select>
          ${s.type === 'entries' ? `
            <div class="sub-block">
              ${(s.items || []).map((it, j) => `
                <div class="array-item">
                  <div class="item-header">
                    <span class="item-tag">Élément ${j + 1}</span>
                    ${btn("remove-item", `${i},${j}`, "✕ Retirer", "btn-remove")}
                  </div>
                  ${field("Date", `sections.${i}.items.${j}.date`, it.date)}
                  ${field("Titre", `sections.${i}.items.${j}.title`, it.title)}
                  ${field("Organisation", `sections.${i}.items.${j}.org`, it.org)}
                  ${field("Points clés (une ligne = un point)", `sections.${i}.items.${j}.bulletsText`, it.bulletsText, { textarea: true })}
                  ${field("Stack / outils", `sections.${i}.items.${j}.stack`, it.stack)}
                </div>`).join("")}
              ${btn("add-item", i, "+ Ajouter un élément", "btn-add")}
            </div>` : `
            <div class="sub-block">
              ${field("Contenu", `sections.${i}.content`, s.content, { textarea: true })}
            </div>`}
        </div>`).join("")}
      ${btn("add-section", undefined, "+ Ajouter une section", "btn-add")}
    </div>`;
  document.getElementById("formRoot").innerHTML = general + links + skills + formation + sections;
}

function handleAction(action, idxStr) {
  const idxs = idxStr !== undefined ? String(idxStr).split(",").map(Number) : [];
  switch (action) {
    case "add-link": currentData.links.push({ label: "Nouveau lien", url: "#" }); break;
    case "remove-link": currentData.links.splice(idxs[0], 1); break;
    case "add-skill": currentData.skills.push({ name: "Nouvelle compétence", value: "" }); break;
    case "remove-skill": currentData.skills.splice(idxs[0], 1); break;
    case "add-formation": currentData.formation.push({ year: "", title: "", school: "" }); break;
    case "remove-formation": currentData.formation.splice(idxs[0], 1); break;
    case "add-section": currentData.sections.push({ title: "Nouvelle section", type: "text", content: "", items: [] }); break;
    case "remove-section": currentData.sections.splice(idxs[0], 1); break;
    case "add-item":
      if (!currentData.sections[idxs[0]].items) currentData.sections[idxs[0]].items = [];
      currentData.sections[idxs[0]].items.push({ date: "", title: "", org: "", bulletsText: "", stack: "" });
      break;
    case "remove-item": currentData.sections[idxs[0]].items.splice(idxs[1], 1); break;
  }
  renderForm();
  mount();
}

const formRoot = document.getElementById("formRoot");
const statusEl = document.getElementById("status");
const jsonInput = document.getElementById("jsonInput");
const jsonPanel = document.getElementById("jsonPanel");
formRoot.addEventListener("input", (e) => {
  const t = e.target;
  if (t.dataset.field) {
    setPath(currentData, t.dataset.field, t.value);
    mount();
  }
});
formRoot.addEventListener("change", (e) => {
  const t = e.target;
  if (t.tagName === "SELECT" && t.dataset.field) {
    setPath(currentData, t.dataset.field, t.value);
    renderForm();
    mount();
  }
});
formRoot.addEventListener("click", (e) => {
  const btnEl = e.target.closest("[data-action]");
  if (!btnEl) return;
  handleAction(btnEl.dataset.action, btnEl.dataset.idx);
});
document.getElementById("avatarFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    currentData.avatarUrl = evt.target.result;
    renderForm();
    mount();
    statusEl.textContent = "✅ Photo mise à jour";
    statusEl.className = "ok";
  };
  reader.readAsDataURL(file);
  e.target.value = "";
});
document.getElementById("btnReset").addEventListener("click", () => {
  currentData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  renderForm();
  mount();
  jsonInput.value = JSON.stringify(currentData, null, 2);
  statusEl.textContent = "Réinitialisé";
  statusEl.className = "ok";
});
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      currentData = JSON.parse(evt.target.result);
      renderForm();
      mount();
      jsonInput.value = JSON.stringify(currentData, null, 2);
      statusEl.textContent = "✅ Fichier chargé";
      statusEl.className = "ok";
    } catch (err) {
      statusEl.textContent = "❌ Erreur JSON : " + err.message;
      statusEl.className = "error";
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});
document.getElementById("btnDownloadJson").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "cv-data.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
document.getElementById("btnDownloadHtml").addEventListener("click", () => {
  const fullHtml = `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>${FIXED.fullName} — CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>${document.getElementById('cv-styles').textContent}
body{margin:0;background:#e9e5da;display:flex;justify-content:center;padding:24px;}
.page{margin:0 auto;height:auto;overflow:visible;box-shadow:none;}
</style>
</head>
<body>
<div class="page">${renderCV(currentData)}</div>
</body>
</html>`;
  navigator.clipboard.writeText(fullHtml).then(() => {
    statusEl.textContent = "✅ HTML copié dans le presse-papiers";
    statusEl.className = "ok";
  }).catch((err) => {
    statusEl.textContent = "❌ Erreur copie : " + err.message;
    statusEl.className = "error";
  });
});

let jsonMode = false;
let liveTimer = null;
document.getElementById("btnToggleJson").addEventListener("click", () => {
  jsonMode = !jsonMode;
  jsonPanel.classList.toggle("open", jsonMode);
  formRoot.style.display = jsonMode ? "none" : "block";
  if (jsonMode) jsonInput.value = JSON.stringify(currentData, null, 2);
});
jsonInput.addEventListener("input", () => {
  clearTimeout(liveTimer);
  liveTimer = setTimeout(() => {
    try {
      currentData = JSON.parse(jsonInput.value);
      mount();
      renderForm();
      statusEl.textContent = "✅ Aperçu en direct";
      statusEl.className = "ok";
    } catch (e) {
      statusEl.textContent = "❌ Erreur JSON : " + e.message;
      statusEl.className = "error";
    }
  }, 400);
});

renderForm();
mount();
jsonInput.value = JSON.stringify(currentData, null, 2);
statusEl.textContent = "Prêt";
statusEl.className = "ok";
</script>
</body>
</html>
